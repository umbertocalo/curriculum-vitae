<header class="site-header">
  <nav>
    <a href="{{ '/' | relative_url }}">{{ site.data.profile.name }}</a>
  </nav>
  <div class="header-actions">
    <a href="{{ '/assets/cv.pdf' | relative_url }}" target="_blank" class="download-btn" id="download-cv">↓ pdf</a>
    <script>
      (() => {
        const d = new Date();
        const date = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        document.getElementById('download-cv').setAttribute('download', date + '-UmbertoCalo-CV.pdf');
      })();
    </script>
    <button id="theme-toggle" class="theme-toggle" aria-label="Cambia tema">dark</button>
  </div>
</header>
