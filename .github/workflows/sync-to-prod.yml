name: Sync to Prod

on:
  push:
    branches: [main]

jobs:
  sync:
    if: contains(github.event.head_commit.message, 'prod')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to prod repo
        env:
          REPO_TO_REPO_PAT: ${{ secrets.repo_to_repo_PAT }}
        run: |
          git remote add prod https://umbertocalo:${REPO_TO_REPO_PAT}@github.com/umbertocalo/curriculum-vitae.git
          git -c "http.https://github.com/.extraheader=" push prod main
