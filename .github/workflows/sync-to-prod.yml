name: Sync to Prod

on:
  push:
    branches: [main]

jobs:
  sync:
    if: contains(github.event.head_commit.message, 'prod')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Adapt for prod and push
        env:
          REPO_TO_REPO_PAT: ${{ secrets.repo_to_repo_PAT }}
        run: |
          sed -i 's/umbical\.dpdns\.org/umbertocalo.dpdns.org/g' README.md _config.yml
          sed -i '/{% include dev-badge.html %}/d' _includes/header.html
          sed -i '/@import "dev-badge";/d' assets/css/main.scss
          rm -f _includes/dev-badge.html _sass/_dev-badge.scss
          git config user.name "umbertocalo"
          git config user.email "umbertocalo@users.noreply.github.com"
          git add -A
          git commit -m "chore: set prod URLs"
          git remote add prod https://umbertocalo:${REPO_TO_REPO_PAT}@github.com/umbertocalo/curriculum-vitae.git
          git -c "http.https://github.com/.extraheader=" push prod main
