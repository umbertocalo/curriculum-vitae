site_name: Umberto Calò - Curriculum Vitae
site_description: Network, Data Center and Automation Engineer
site_author: Umberto Calò
site_url: https://tuodominio.dpdns.org

repo_url: https://github.com/umbertocalo/pvt-curriculum-vitae
repo_name: umbertocalo/pvt-curriculum-vitae
edit_uri: edit/main/docs/

# Con MkDocs i file .md vanno dentro una cartella docs/ (non nella root)
docs_dir: docs

theme:
  name: material
  language: it
  palette:
    # Toggle automatico chiaro/scuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passa al tema chiaro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passa al tema scuro
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant       # navigazione senza reload pagina
    - navigation.tracking
    - navigation.top           # bottone "torna su"
    - toc.integrate            # indice integrato nella sidebar
    - content.action.edit      # link "modifica su GitHub"
    - content.code.copy

# Se il CV è una singola pagina, niente nav = niente sidebar di navigazione
# (rimuovi questa sezione se vuoi più pagine tipo /esperienze /progetti /certificazioni)
nav:
  - Home: index.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition            # box tipo "note", "warning" ecc. (utile per evidenziare skill/tag)
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true       # link ancora accanto ai titoli
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/umbertocalo
    - icon: fontawesome/brands/github
      link: https://www.github.com/umbertocalo
    - icon: fontawesome/solid/envelope
      link: mailto:umbertocalo09@gmail.com

copyright: Copyright &copy; 2026 Umberto Calò