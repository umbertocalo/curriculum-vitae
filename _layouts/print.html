<!doctype html>
<html lang="{{ site.lang }}" data-theme="light" data-accent="{{ site.default_accent | default: 'blue' }}">
<head>
  <meta charset="utf-8">
  <title>{{ site.data.profile.name }} — CV</title>
  <link rel="stylesheet" href="{{ '/assets/css/print.css' | relative_url }}">
</head>
<body class="print-body">
  <div class="wrap print-wrap">
    {{ content }}
    <p class="print-footer">Generated automatically — {{ 'now' | date: "%B %Y" }} · {{ site.url }}</p>
  </div>
</body>
</html>
